        function navigateTo(page) {
            content.innerHTML = pages[page] || pages.home;
            mobileMenu.classList.add('hidden');
            window.scrollTo(0, 0);

            if (page === 'contato') setupContactForm();
        }

        function copyToClipboard(text) {
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            
            const msgBox = document.getElementById('form-message');
            if(msgBox) {
                msgBox.textContent = 'E-mail copiado para a área de transferência!';
                msgBox.className = 'mt-4 p-4 rounded-xl text-center font-medium bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300';
                msgBox.classList.remove('hidden');
                setTimeout(() => msgBox.classList.add('hidden'), 3000);
            }
        }

        async function setupContactForm() {
            const form = document.getElementById('contact-form');
            const btn = document.getElementById('btn-submit');
            const emailInput = document.getElementById('email');
            const emailError = document.getElementById('email-error');
            const msgBox = document.getElementById('form-message');

            const validateEmail = (email) => {
                return String(email)
                    .toLowerCase()
                    .match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/);
            };

            emailInput.addEventListener('input', () => {
                const isValid = validateEmail(emailInput.value);
                if (emailInput.value === "") {
                    btn.disabled = true;
                    btn.classList.add('opacity-50', 'cursor-not-allowed');
                    emailError.classList.add('hidden');
                    emailInput.classList.remove('border-red-500', 'border-green-500');
                } else if (!isValid) {
                    btn.disabled = true;
                    btn.classList.add('opacity-50', 'cursor-not-allowed');
                    emailError.classList.remove('hidden');
                    emailInput.classList.add('border-red-500');
                    emailInput.classList.remove('border-green-500');
                } else {
                    btn.disabled = false;
                    btn.classList.remove('opacity-50', 'cursor-not-allowed');
                    emailError.classList.add('hidden');
                    emailInput.classList.remove('border-red-500');
                    emailInput.classList.add('border-green-500');
                }
            });

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                btn.disabled = true;
                btn.textContent = 'Enviando...';
                
                const name = document.getElementById('name').value;
                const email = emailInput.value;
                const message = document.getElementById('message').value;

                const Contact = Parse.Object.extend("Contact");
                const contact = new Contact();

                contact.set("name", name);
                contact.set("email", email);
                contact.set("message", message);

                try {
                    await contact.save();
                    
                    const subject = encodeURIComponent(`Nova Encomenda - ${name}`);
                    const body = encodeURIComponent(`Nome: ${name}\nE-mail: ${email}\n\nPedido/Mensagem:\n${message}`);
                    const mailtoLink = `mailto:jldecor.araruama@hotmail.com?subject=${subject}&body=${body}`;
                    
                    window.location.href = mailtoLink;

                    msgBox.innerHTML = `
                        <p>Mensagem salva com sucesso!</p>
                        <p class="text-xs mt-2 opacity-80">Se o seu e-mail não abriu automaticamente, clique no botão "Copiar" acima.</p>
                    `;
                    msgBox.className = 'mt-4 p-4 rounded-xl text-center font-medium bg-green-100 text-green-700';
                    msgBox.classList.remove('hidden');
                    form.reset();
                    btn.classList.add('opacity-50', 'cursor-not-allowed');
                } catch (error) {
                    msgBox.textContent = 'Erro ao salvar. Tente o WhatsApp ou copie o e-mail.';
                    msgBox.className = 'mt-4 p-4 rounded-xl text-center font-medium bg-red-100 text-red-700';
                    msgBox.classList.remove('hidden');
                } finally {
                    btn.disabled = !validateEmail(emailInput.value);
                    btn.textContent = 'Enviar Encomenda';
                }
            });
        }

        function updateThemeIcons() {
            const isDark = document.documentElement.classList.contains('dark');
            const iconMarkup = isDark 
                ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h1M4 9h1m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />'
                : '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />';
            
            document.getElementById('theme-icon').innerHTML = iconMarkup;
            document.querySelectorAll('.theme-icon-mobile').forEach(el => el.innerHTML = iconMarkup);
        }

        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            updateThemeIcons();
        }

        themeToggle.onclick = toggleTheme;
        themeToggleMob.onclick = toggleTheme;
        mobileMenuBtn.onclick = () => mobileMenu.classList.toggle('hidden');

        window.onload = () => {
            navigateTo('home');
            updateThemeIcons();
        };
    </script>
</body>
</html>
